<div class="m-2">
  <div class="justify-items-center">
    <div role="tablist" class="tabs tabs-border">
      <a role="tab" class="tab" [ngClass]="{'tab-active':tab === 1}" (click)="changeTab(1)">Algemene Informatie</a>
      <a role="tab" class="tab" [ngClass]="{'tab-active':tab === 2}" (click)="changeTab(2)">Praktijk kenmerken</a>
      <a role="tab" class="tab" [ngClass]="{'tab-active':tab === 3}" (click)="changeTab(3)">Team samenstelling</a>
    </div>
    @switch (tab){
      @case (1) {
        <app-algemene-informatie></app-algemene-informatie>
      }
      @case (2) {
        <app-praktijk-kenmerken></app-praktijk-kenmerken>
      }
      @case (3) {
        <app-team-samenstelling></app-team-samenstelling>
      }
    }
  </div>
</div>
