@if (auth.isLoading$ | async) {

  <div>Loading...</div>

} @else {
  @if ((auth.isAuthenticated$ | async) && (auth.user$ | async)) {
    <app-nav-bar></app-nav-bar>
    <app-disclamer></app-disclamer>
    <router-outlet></router-outlet>
  }
  @for (toast of toastService.toasts(); track toast; let i = $index) {
    <div class="toast toast-bottom toast-end">
      <div [className]="toast.type === 'success' ? 'alert alert-success': 'alert alert-error'">
        <span>{{ toast.message }}</span>
        <button class="btn btn-ghost btn-xs" (click)="toastService.remove(i)">X</button>
      </div>
    </div>
  }
}
