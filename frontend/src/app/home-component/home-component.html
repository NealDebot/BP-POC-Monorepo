<div class="m-2">
  <div class="justify-items-center">
    <div role="tablist" class="tabs tabs-border">
      <a role="tab" class="tab" [ngClass]="{'tab-active':tab === 1}" (click)="changeTab(1)">Openstaande
        vragenlijsten</a>
      <a role="tab" class="tab" [ngClass]="{'tab-active':tab === 2}" (click)="changeTab(2)">Rapporten</a>
    </div>
    @if (tab === 1) {
      <app-vragenlijsten></app-vragenlijsten>
    } @else if (tab === 2) {
      <app-rapporten></app-rapporten>
    }
  </div>
</div>
